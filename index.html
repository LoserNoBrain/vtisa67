["Что такое «энергоэффективность» устройства?", "Способность устройства выполнять свои функции, потребляя как можно меньше электричества."],
["Для чего в IoT-проектах нужна документация (инструкция)?", "Чтобы другие люди (или вы сами через год) могли понять, как всё устроено и как это починить."],
["Какое будущее предсказывают для интернета вещей?", "Миллиарды подключенных устройств, делающих жизнь людей безопаснее и удобнее."],
["Кто такой «инженер IoT»?", "Специалист, который умеет проектировать, собирать и программировать умные системы."],
],
    pm09: [["Что делает DHCP?", "Выдает IP-адреса"]],
    pm10: [["Что измеряет TDR?", "Длину кабеля"]],
};

let quizQueue = [];
let currentQuestionIndex = 0;
let score = 0;
let totalToAsk = 0;

function showSection(section) {
    let html = "<table><tr><th style='width: 50px;'>№</th><th>Вопрос</th><th>Ответ</th></tr>";
    data[section].forEach((item, index) => {
        html += `<tr><td><b>${index + 1}</b></td><td>${item[0]}</td><td>${item[1]}</td></tr>`;
    });
    html += "</table>";
    document.getElementById("content").innerHTML = html;
}

function showModeSelection() {
    document.getElementById("content").innerHTML = `
        <div class="quiz-card mode-select">
            <h2>Выберите режим прохождения</h2>
            <button class="mode-btn" style="background: #3498db;" onclick="startQuiz(30)">Спринт (30 вопросов)</button>
            <button class="mode-btn" style="background: #e74c3c;" onclick="startQuiz(240)">Ад (240 вопросов)</button>
        </div>
    `;
}

function startQuiz(count) {
    score = 0;
    currentQuestionIndex = 0;
    totalToAsk = count;

    // Собираем все вопросы, перемешиваем и берем нужное количество
    let all = [...data.pm08, ...data.pm09, ...data.pm10];
    quizQueue = all.sort(() => Math.random() - 0.5).slice(0, count);
    
    renderQuestion();
}

function renderQuestion() {
    if (currentQuestionIndex >= quizQueue.length) {
        document.getElementById("content").innerHTML = `
            <div class="quiz-card" style="text-align:center">
                <h2>Тест завершен!</h2>
                <p style="font-size: 24px">Ваш результат: <b>${score}</b> из <b>${totalToAsk}</b></p>
                <button class="menu button" style="background:#1abc9c" onclick="showModeSelection()">Попробовать снова</button>
            </div>
        `;
        return;
    }

    let q = quizQueue[currentQuestionIndex];
    let allAnswers = [...data.pm08, ...data.pm09, ...data.pm10].map(i => i[1]);
    
    // Генерируем варианты (правильный + 3 случайных)
    let options = [q[1]];
    while(options.length < 4) {
        let rand = allAnswers[Math.floor(Math.random() * allAnswers.length)];
        if(!options.includes(rand)) options.push(rand);
    }
    options.sort(() => Math.random() - 0.5);

    document.getElementById("content").innerHTML = `
        <div class="quiz-card">
            <div id="score-counter">Вопрос ${currentQuestionIndex + 1} из ${totalToAsk} | Правильно: ${score}</div>
            <h3>${q[0]}</h3>
            ${options.map(opt => `
                <button class="option-btn" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}','${q[1].replace(/'/g, "\\")}')">
                    ${opt}
                </button>
            `).join('')}
        </div>
    `;
}

function checkAnswer(btn, selected, correct) {
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach(b => b.disabled = true);

    if (selected === correct) {
        btn.classList.add('correct');
        score++;
    } else {
        btn.classList.add('wrong');
        btns.forEach(b => {
            if(b.innerText.trim() === correct.trim()) b.classList.add('correct');
        });
    }

    currentQuestionIndex++;
    setTimeout(renderQuestion, 1200);
}

function searchTable() {
    let input = document.getElementById("search").value.toLowerCase();
    let rows = document.querySelectorAll("table tr");
    rows.forEach((row, i) => { if(i>0) row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none"; });
}

showSection('pm08');
</script>
